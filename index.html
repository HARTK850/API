<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-IVR מגן צינתוקים + Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>body{font-family:Assistant,sans-serif;background:#f8fafc}.console{background:#111;color:#0f0;padding:1rem;border-radius:8px;height:280px;overflow-y:auto;}</style>
</head>
<body class="p-8 max-w-3xl mx-auto">
<div class="bg-white rounded-3xl shadow-xl p-10">
    <h1 class="text-4xl font-bold text-center text-blue-800 mb-8">AI-IVR עם Gemini + ימות המשיח</h1>
    
    <div class="grid grid-cols-2 gap-6">
        <div><label class="block font-bold mb-2">Gemini API Key</label><input id="gemini" type="password" class="w-full p-4 border rounded-2xl"></div>
        <div><label class="block font-bold mb-2">נתיב השלוחה בימות</label><input id="extPath" value="/1" class="w-full p-4 border rounded-2xl"></div>
    </div>
    <button onclick="save()" class="mt-8 w-full bg-green-600 text-white py-5 rounded-3xl font-bold text-xl">שמור + העתק Webhook URL</button>
    
    <div class="mt-10">
        <label class="font-bold">Webhook URL (העתק לימות):</label>
        <input id="url" readonly class="w-full p-4 bg-gray-100 rounded-2xl text-blue-600 font-mono">
    </div>
    
    <div class="mt-8 bg-black text-green-400 p-6 rounded-2xl font-mono text-sm console" id="log"></div>
</div>

<script>
const log = txt => { const d=document.createElement('div'); d.textContent=`[${new Date().toLocaleTimeString('he-IL')}] ${txt}`; document.getElementById('log').appendChild(d); };
function save(){
    localStorage.gemini = document.getElementById('gemini').value.trim();
    localStorage.extPath = document.getElementById('extPath').value.trim();
    const u = window.location.origin + '/api/webhook';
    document.getElementById('url').value = u;
    log('✅ URL מוכן! העתק אותו ל-api_link בימות');
}
document.getElementById('url').value = window.location.origin + '/api/webhook';
</script>
</body>
</html>
